<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Chatbot Widget — edysma.com</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 80px auto;
      padding: 0 24px;
      color: #333;
      background: #f5f7fa;
    }
    h1 { color: #667eea; }
    p { line-height: 1.7; }
    .badge {
      display: inline-block;
      background: #667eea;
      color: #fff;
      border-radius: 4px;
      padding: 2px 10px;
      font-size: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .hint {
      background: #eef0ff;
      border-left: 4px solid #667eea;
      padding: 12px 16px;
      border-radius: 4px;
      margin-top: 24px;
    }
    .hint em { color: #555; }
  </style>
</head>
<body>
  <h1>Edysma <span class="badge">Test Widget</span></h1>
  <p>Questa è una pagina di test per il chatbot widget. Il pulsante di chat si trova in basso a destra.</p>
  <div class="hint">
    Prova a chiedere:<br>
    <em>"Cosa fate?", "Dove siete?", "Quali servizi offrite?", "Come vi contatto?"</em>
  </div>

  <!-- Imposta il dominio prima del caricamento del widget -->
  <script>window.CHATBOT_DOMAIN = 'edysma.com';</script>
  <script src="chatbot-widget.js"></script>
</body>
</html>
